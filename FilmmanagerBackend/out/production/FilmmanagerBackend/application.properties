spring.application.name=FilmmanagerBackend
server.port=8081

# Default local setup: H2 for quick start. Replace with MariaDB values or set the env vars below
# when XAMPP/MariaDB is running.
spring.datasource.url=${FILMMANAGER_DB_URL:jdbc:h2:mem:filmmanager;MODE=MySQL;DB_CLOSE_DELAY=-1;DATABASE_TO_UPPER=false}
spring.datasource.username=${FILMMANAGER_DB_USER:sa}
spring.datasource.password=${FILMMANAGER_DB_PASSWORD:}
spring.datasource.driver-class-name=${FILMMANAGER_DB_DRIVER:org.h2.Driver}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
